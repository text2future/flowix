name: Release

# Tag-driven release pipeline. Triggers on:
#   - push of a tag matching v* (e.g. v1.0.3)
#   - manual workflow_dispatch (for ad-hoc dry runs)
#
# Cross-platform matrix builds everything that `npm run tauri:build` can
# produce. `tauri-action` is the official Tauri integration: it consumes
# TAURI_SIGNING_PRIVATE_KEY, signs updater artifacts, and creates the
# GitHub release with the right assets and an `update.json` manifest.
#
# Required secrets (set in repo Settings → Secrets and variables):
#   TAURI_SIGNING_PRIVATE_KEY         - minisign private key contents
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - optional, only if your key has one
#   GITHUB_TOKEN                      - provided automatically by Actions
#
# Optional (only needed for native installer signing, NOT required for
# tauri-plugin-updater's minisign signature):
#   APPLE_SIGNING_IDENTITY, APPLE_TEAM_ID, APPLE_KEYCHAIN_PROFILE
#   WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD, WINDOWS_CERT_THUMBPRINT, WINDOWS_TIMESTAMP_URL

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# prevent duplicate runs while a release is in flight
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/target -> release

      - name: Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Build + sign + publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # minisign (tauri-plugin-updater). Required.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # macOS code-signing. Optional. Skip with FLOWIX_ALLOW_UNSIGNED=1.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}

          # Windows code-signing.
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}

        with:
          tagName: v__VERSION__
          releaseName: "Flowix v__VERSION__"
          releaseBody: |
            See the [CHANGELOG] for the full set of changes.

            [CHANGELOG]: ../../CHANGELOG.md
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
