<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowix</title>
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
    <!--
      首屏 boot: 在 CSS paint 之前把 data-theme 写到 <html>。
      走外部文件 (而不是 inline <script>) 是因为 Tauri CSP 的
      script-src 'self' 'unsafe-eval' 不含 'unsafe-inline'。 同源
      脚本不受此限制。 详见 public/theme-boot.js。
    -->
    <script src="/theme-boot.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
